<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMS 予約一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif; background: #F8FAFC; color: #0F172A; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ===== LAYOUT ===== */
  .layout { display: flex; min-height: 100vh; }

  /* ===== SIDE NAV ===== */
  .sidenav {
    width: 220px; min-height: 100vh; background: #0F172A; color: #CBD5E1;
    display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100;
    transition: width 0.25s cubic-bezier(.4,0,.2,1); overflow: hidden;
  }
  .sidenav.collapsed { width: 56px; }
  .sidenav-toggle { background: none; border: none; color: #94A3B8; cursor: pointer; padding: 18px 16px 12px; text-align: right; font-size: 18px; }
  .sidenav.collapsed .sidenav-toggle { text-align: center; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 20px;
    cursor: pointer; font-size: 14px; font-weight: 400; color: #94A3B8;
    border-right: 3px solid transparent; transition: all 0.15s; white-space: nowrap;
  }
  .sidenav.collapsed .nav-item { padding: 12px 0; justify-content: center; }
  .nav-item:hover { background: rgba(255,255,255,0.05); }
  .nav-item.active { background: rgba(59,130,246,0.15); border-right-color: #3B82F6; color: #E2E8F0; font-weight: 600; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-label { overflow: hidden; }
  .sidenav.collapsed .nav-label, .sidenav.collapsed .nav-lock, .sidenav.collapsed .sidenav-footer { display: none; }
  .nav-lock { font-size: 10px; color: #64748B; margin-left: auto; }
  .sidenav-footer { padding: 16px 20px; border-top: 1px solid #1E293B; font-size: 11px; color: #475569; margin-top: auto; }

  /* ===== MAIN ===== */
  .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; transition: margin-left 0.25s cubic-bezier(.4,0,.2,1); }

  /* ===== HEADER ===== */
  .header { background: #fff; border-bottom: 1px solid #E2E8F0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; }
  .hotel-name { font-size: 18px; font-weight: 700; color: #0F172A; letter-spacing: 2px; }
  .header-right { display: flex; align-items: center; gap: 24px; font-size: 13px; color: #64748B; }
  .header-time { font-variant-numeric: tabular-nums; }
  .header-staff { color: #334155; font-weight: 500; }
  .btn-logout { background: none; border: 1px solid #CBD5E1; border-radius: 6px; padding: 5px 14px; font-size: 12px; color: #64748B; cursor: pointer; font-family: inherit; }
  .header-stats { display: flex; align-items: center; padding: 0 28px 10px; }
  .stat-item { display: flex; align-items: center; gap: 8px; padding: 6px 20px; cursor: pointer; transition: background 0.15s; border-radius: 6px; position: relative; }
  .stat-item:hover { background: #F1F5F9; }
  .stat-item + .stat-item::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 1px; background: #E2E8F0; }
  .stat-label { font-size: 11px; color: #94A3B8; font-weight: 500; }
  .stat-value { font-size: 18px; font-weight: 700; color: #0F172A; line-height: 1; }
  .stat-sub { font-size: 11px; color: #94A3B8; }
  .stat-sub.alert-num { color: #DC2626; font-weight: 600; }
  .stat-accent { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }

  /* ===== CONTENT ===== */
  .content { padding: 20px 28px; flex: 1; }

  /* ===== TOOLBAR ===== */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box {
    display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #E2E8F0;
    border-radius: 8px; padding: 8px 14px; flex: 0 1 320px; min-width: 200px;
  }
  .search-box:focus-within { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .search-icon { color: #94A3B8; font-size: 14px; flex-shrink: 0; }
  .search-input { border: none; outline: none; font-size: 13px; font-family: inherit; color: #0F172A; flex: 1; background: transparent; }
  .search-input::placeholder { color: #CBD5E1; }

  .filter-btn {
    display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #E2E8F0;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #64748B; cursor: pointer;
    font-family: inherit; transition: all 0.15s; position: relative;
  }
  .filter-btn:hover { border-color: #94A3B8; }
  .filter-btn.active { border-color: #3B82F6; color: #3B82F6; background: #EFF6FF; }
  .filter-btn .arrow { font-size: 10px; color: #94A3B8; }

  .toolbar-spacer { flex: 1; }
  .btn-primary {
    background: #3B82F6; color: #fff; border: none; border-radius: 8px;
    padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background 0.15s;
  }
  .btn-primary:hover { background: #2563EB; }
  .btn-secondary {
    background: #fff; color: #64748B; border: 1px solid #E2E8F0; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .btn-secondary:hover { background: #F8FAFC; }

  /* ===== FILTER PANEL ===== */
  .filter-panel {
    background: #fff; border: 1px solid #E2E8F0; border-radius: 10px;
    padding: 16px 20px; margin-bottom: 16px; display: none;
  }
  .filter-panel.open { display: block; }
  .filter-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-group-label { font-size: 11px; color: #94A3B8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-chip {
    padding: 4px 12px; border-radius: 99px; font-size: 12px; cursor: pointer;
    border: 1px solid #E2E8F0; background: #fff; color: #64748B; transition: all 0.15s;
    font-family: inherit;
  }
  .filter-chip:hover { border-color: #94A3B8; }
  .filter-chip.selected { background: #EFF6FF; border-color: #3B82F6; color: #3B82F6; font-weight: 500; }
  .date-input {
    border: 1px solid #E2E8F0; border-radius: 6px; padding: 5px 10px;
    font-size: 12px; font-family: inherit; color: #334155;
  }
  .date-input:focus { outline: none; border-color: #3B82F6; }

  /* ===== STATUS CHIPS (summary) ===== */
  .status-summary { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .status-chip {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #E2E8F0;
    background: #fff; color: #64748B; transition: all 0.15s; font-family: inherit;
  }
  .status-chip:hover { border-color: #94A3B8; }
  .status-chip.active { font-weight: 600; }
  .status-chip .count { font-weight: 700; }
  .status-chip.s-all.active { border-color: #334155; color: #334155; background: #F8FAFC; }
  .status-chip.s-confirmed.active { border-color: #3B82F6; color: #3B82F6; background: #EFF6FF; }
  .status-chip.s-checked-in.active { border-color: #22C55E; color: #16A34A; background: #F0FDF4; }
  .status-chip.s-checked-out.active { border-color: #8B5CF6; color: #7C3AED; background: #F5F3FF; }
  .status-chip.s-cancelled.active { border-color: #94A3B8; color: #64748B; background: #F8FAFC; }
  .status-chip.s-noshow.active { border-color: #DC2626; color: #DC2626; background: #FEF2F2; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .sd-confirmed { background: #3B82F6; }
  .sd-checked-in { background: #22C55E; }
  .sd-checked-out { background: #8B5CF6; }
  .sd-cancelled { background: #94A3B8; }
  .sd-noshow { background: #DC2626; }

  /* ===== TABLE ===== */
  .table-wrapper { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 14px; font-size: 11px; font-weight: 600; color: #94A3B8;
    text-align: left; border-bottom: 1px solid #E2E8F0; cursor: pointer;
    user-select: none; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
  }
  thead th:hover { color: #64748B; }
  thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  tbody tr { border-bottom: 1px solid #F8FAFC; cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: #F8FAFC; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.selected { background: #EFF6FF; }
  tbody td { padding: 10px 14px; font-size: 13px; white-space: nowrap; }
  .td-date { color: #334155; font-variant-numeric: tabular-nums; }
  .nights-badge {
    display: inline-block; background: #F1F5F9; color: #64748B; font-size: 10px;
    font-weight: 600; padding: 1px 6px; border-radius: 4px; margin-left: 4px;
  }
  .td-guest { min-width: 160px; max-width: 260px; white-space: normal; }
  .guest-name-row { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
  .guest-name { font-weight: 500; color: #0F172A; white-space: nowrap; margin-right: 2px; }
  .guest-romaji { font-size: 11px; color: #94A3B8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .link-badge {
    display: inline-block; font-size: 10px; background: #F5F3FF; color: #7C3AED;
    padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 600;
  }
  .gap-alert {
    display: inline-block; font-size: 10px; background: #FEF2F2; color: #DC2626;
    padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 600;
  }
  .repeater-badge {
    display: inline-block; font-size: 10px; background: #FEF3C7; color: #B45309;
    padding: 1px 6px; border-radius: 3px; margin-left: 4px; font-weight: 600;
  }
  .vip-badge {
    display: inline-block; font-size: 10px; background: #FDF2F8; color: #BE185D;
    padding: 1px 6px; border-radius: 3px; margin-left: 4px; font-weight: 700;
  }
  .ota-cell { display: flex; align-items: center; gap: 6px; }
  .ota-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ota-name { font-size: 12px; color: #64748B; }
  .td-resno { font-family: monospace; font-size: 12px; color: #94A3B8; }
  .td-room .room-no { font-weight: 500; color: #334155; }
  .td-room .room-type { font-size: 11px; color: #94A3B8; }
  .unassigned { color: #EAB308; font-size: 11px; font-weight: 500; }
  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
  }
  .sb-confirmed { background: #DBEAFE; color: #2563EB; }
  .sb-checked-in { background: #DCFCE7; color: #16A34A; }
  .sb-checked-out { background: #EDE9FE; color: #7C3AED; }
  .sb-cancelled { background: #F1F5F9; color: #94A3B8; text-decoration: line-through; }
  .sb-noshow { background: #FEE2E2; color: #DC2626; }
  .td-amount { font-variant-numeric: tabular-nums; font-weight: 500; text-align: right; }

  /* ===== PAGINATION ===== */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; }
  .page-info { font-size: 12px; color: #94A3B8; }
  .page-buttons { display: flex; gap: 4px; }
  .page-btn {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    border: 1px solid #E2E8F0; border-radius: 6px; font-size: 12px; cursor: pointer;
    background: #fff; color: #64748B; font-family: inherit; transition: all 0.15s;
  }
  .page-btn:hover { background: #F8FAFC; }
  .page-btn.active { background: #3B82F6; color: #fff; border-color: #3B82F6; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== DRAWER ===== */
  .drawer-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.2);
    z-index: 200; display: none; animation: fadeIn 0.2s;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 460px; background: #fff;
    z-index: 201; box-shadow: -4px 0 24px rgba(0,0,0,0.1); display: none;
    flex-direction: column; overflow-y: auto; animation: slideIn 0.25s cubic-bezier(.4,0,.2,1);
  }
  .drawer.open { display: flex; }
  .drawer-header {
    padding: 20px 24px; border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .drawer-title { font-size: 16px; font-weight: 700; }
  .drawer-close { background: none; border: none; font-size: 20px; color: #94A3B8; cursor: pointer; padding: 4px; }
  .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
  .drawer-section { margin-bottom: 20px; }
  .drawer-section-title { font-size: 12px; font-weight: 600; color: #94A3B8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .drawer-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
  .drawer-label { color: #94A3B8; }
  .drawer-value { color: #0F172A; font-weight: 500; }
  .drawer-actions { padding: 16px 24px; border-top: 1px solid #E2E8F0; display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
  .drawer-btn {
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s; border: 1px solid #E2E8F0;
    background: #fff; color: #334155;
  }
  .drawer-btn:hover { background: #F8FAFC; }
  .drawer-btn.primary { background: #3B82F6; color: #fff; border-color: #3B82F6; }
  .drawer-btn.primary:hover { background: #2563EB; }

  /* Timeline bar */
  .timeline { margin: 8px 0; }
  .timeline-bar { display: flex; height: 24px; border-radius: 6px; overflow: hidden; border: 1px solid #E2E8F0; }
  .timeline-seg { display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 600; min-width: 30px; }
  .timeline-legend { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: #94A3B8; }
  .timeline-legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }

  /* Charge table in drawer */
  .charge-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .charge-table th { text-align: left; padding: 4px 8px; color: #94A3B8; font-weight: 500; border-bottom: 1px solid #F1F5F9; }
  .charge-table td { padding: 4px 8px; color: #334155; border-bottom: 1px solid #F8FAFC; }
  .charge-table .total-row td { font-weight: 700; border-top: 1px solid #E2E8F0; }

  /* Stay history accordion */
  .history-toggle {
    display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
    font-size: 12px; color: #3B82F6; font-weight: 500; padding: 2px 8px;
    border-radius: 4px; border: 1px solid #DBEAFE; background: #EFF6FF;
    transition: all 0.15s; font-family: inherit;
  }
  .history-toggle:hover { background: #DBEAFE; }
  .history-toggle .arrow { font-size: 10px; transition: transform 0.2s; }
  .history-toggle.open .arrow { transform: rotate(180deg); }
  .history-panel { display: none; margin-top: 8px; }
  .history-panel.open { display: block; }
  .history-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-left: 3px solid #E2E8F0; margin-bottom: 4px; font-size: 12px;
    background: #FAFBFC; border-radius: 0 6px 6px 0;
  }
  .history-item .h-date { color: #334155; font-weight: 500; min-width: 90px; }
  .history-item .h-room { color: #64748B; min-width: 80px; }
  .history-item .h-ota { display: flex; align-items: center; gap: 4px; min-width: 70px; }
  .history-item .h-amount { color: #334155; font-weight: 500; margin-left: auto; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="layout">
  <!-- Side Nav -->
  <nav class="sidenav" id="sidenav">
    <button class="sidenav-toggle" onclick="toggleNav()" id="navToggle">◂</button>
    <div style="padding: 12px 0; flex: 1;">
      <a class="nav-item" onclick="location.href='pms_dashboard.html'"><span class="nav-icon">◉</span><span class="nav-label">ダッシュボード</span></a>
      <a class="nav-item active"><span class="nav-icon">☰</span><span class="nav-label">予約一覧</span></a>
      <a class="nav-item"><span class="nav-icon">▦</span><span class="nav-label">アサインボード</span></a>
      <a class="nav-item"><span class="nav-icon">⊞</span><span class="nav-label">ルームインジケーター</span></a>
      <a class="nav-item"><span class="nav-icon">◫</span><span class="nav-label">清掃管理</span></a>
      <a class="nav-item"><span class="nav-icon">◈</span><span class="nav-label">売上レポート</span><span class="nav-lock">🔒</span></a>
      <a class="nav-item"><span class="nav-icon">⚙</span><span class="nav-label">設定</span><span class="nav-lock">🔒</span></a>
    </div>
    <div class="sidenav-footer">PMS v0.1 dev</div>
  </nav>

  <div class="main" id="mainArea">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="hotel-name">PATINA HOTEL OKINAWA</div>
        <div class="header-right">
          <span class="header-time" id="clock"></span>
          <span class="header-staff">👤 山田 花子</span>
          <button class="btn-logout">ログアウト</button>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-accent" style="background:#3B82F6"></span>
          <span class="stat-label">CI予定</span>
          <span class="stat-value">5</span>
          <span class="stat-sub alert-num">未CI: 2</span>
        </div>
        <div class="stat-item">
          <span class="stat-accent" style="background:#8B5CF6"></span>
          <span class="stat-label">CO予定</span>
          <span class="stat-value">3</span>
          <span class="stat-sub alert-num">未CO: 1</span>
        </div>
        <div class="stat-item">
          <span class="stat-accent" style="background:#22C55E"></span>
          <span class="stat-label">稼働率</span>
          <span class="stat-value">18<span style="font-size:13px;font-weight:400;color:#94A3B8">/24</span></span>
          <span class="stat-sub">75%</span>
        </div>
        <div class="stat-item">
          <span class="stat-accent" style="background:#14B8A6"></span>
          <span class="stat-label">清掃</span>
          <span class="stat-sub">清掃中 <b style="color:#0F172A">4</b></span>
          <span class="stat-sub">点検待 <b style="color:#0F172A">1</b></span>
          <span class="stat-sub">Ready <b style="color:#22C55E">6</b></span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="ゲスト名・予約番号で検索" id="searchInput">
        </div>
        <button class="filter-btn" id="filterToggle" onclick="toggleFilter()">
          <span>フィルタ</span>
          <span class="arrow">▼</span>
        </button>
        <div class="toolbar-spacer"></div>
        <button class="btn-secondary" onclick="alert('CSV出力')">📥 CSV出力</button>
        <button class="btn-primary" onclick="alert('手動予約入力')">＋ 手動予約入力</button>
      </div>

      <!-- Filter Panel -->
      <div class="filter-panel" id="filterPanel">
        <div class="filter-row">
          <div class="filter-group">
            <span class="filter-group-label">OTA</span>
            <div class="filter-chips">
              <button class="filter-chip" data-filter="ota" data-value="jalan">🔴 じゃらん</button>
              <button class="filter-chip" data-filter="ota" data-value="rakuten">🟤 楽天</button>
              <button class="filter-chip" data-filter="ota" data-value="booking">🔵 Booking</button>
              <button class="filter-chip" data-filter="ota" data-value="direct">🟢 直販</button>
              <button class="filter-chip" data-filter="ota" data-value="phone">🟠 電話</button>
              <button class="filter-chip" data-filter="ota" data-value="expedia">🟡 Expedia</button>
              <button class="filter-chip" data-filter="ota" data-value="agoda">🟣 Agoda</button>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-group-label">室タイプ</span>
            <div class="filter-chips">
              <button class="filter-chip" data-filter="room">シングル</button>

});

// === Status Filter ===
function filterStatus(el, status) {
  document.querySelectorAll('.status-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// === Clock ===
function updateClock() {
  const d = new Date();
  const days = ["日","月","火","水","木","金","土"];
  document.getElementById("clock").textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）` +
    `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
}
updateClock(); setInterval(updateClock, 1000);

  const nav = document.getElementById("sidenav");

  btn.textContent = nav.classList.contains("collapsed") ? "▸" : "◂";
  document.getElementById("mainArea").style.marginLeft = nav.classList.contains("collapsed") ? "56px" : "220px";
}
